<svg viewBox="0 0 720 480" width="720" height="480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Bella compression curve</title>
<desc id="desc">A scatter plot of raw transcript tokens against expand pack tokens for four synthetic scenarios. The diagonal y=x line marks where Bella breaks even. Points below the diagonal mean Bella saved tokens. The linear fit predicts a break-even raw transcript size of about 214 tokens.</desc>
