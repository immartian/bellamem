<svg viewBox="0 0 720 480" width="720" height="480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="rtitle rdesc">
<title id="rtitle">Bella compression ratio across all scenarios</title>
<desc id="rdesc">A scatter plot of 19 scenarios — 4 synthetic and 15 real Claude Code sessions sampled from 15 different projects. X axis: raw conversation tokens, log scale, 50 to 200,000. Y axis: compression ratio (raw / expand pack tokens), log scale, 0.5 to 100. A horizontal dashed line at ratio = 1 marks break-even (above means Bella saved tokens). The curve climbs monotonically with raw transcript size, from below 1 at toy scale to 90 at production scale.</desc>
