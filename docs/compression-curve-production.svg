<svg viewBox="0 0 720 480" width="720" height="480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ptitle pdesc">
<title id="ptitle">Bella compression at production scale</title>
<desc id="pdesc">15 real Claude Code sessions sampled across 15 different projects. Log-x raw conversation tokens against linear-y expand pack tokens at budget 1500. A horizontal line marks the budget ceiling. As raw tokens grow by orders of magnitude, the expand pack saturates at the budget — so the compression ratio diverges with raw size. Median ratio across the sample is around 17×.</desc>
