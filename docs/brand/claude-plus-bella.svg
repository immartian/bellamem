<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 1200 640" width="1200" height="640"
     role="img" aria-labelledby="title desc" version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title id="title">Claude + Bella &gt; 8× effective context window</title>
  <desc id="desc">A conceptual equation graphic: the Claude mark plus a luminous Bella belief-graph orb equals greater than 8x sustained context window. Below the equation, three metric callouts: 18x median compression across 15 real Claude Code projects, 11x retention vs /compact on held-out bench, indefinite multi-session coherence.</desc>

  <defs>
    <!-- Node gradients for the orb -->
    <radialGradient id="nIndigo" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgb(147,150,255)"/>
      <stop offset="100%" stop-color="rgb(79,82,221)"/>
    </radialGradient>
    <radialGradient id="nTeal" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgb(60,225,175)"/>
      <stop offset="100%" stop-color="rgb(10,155,100)"/>
    </radialGradient>
    <radialGradient id="nAmber" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgb(255,200,90)"/>
      <stop offset="100%" stop-color="rgb(210,130,5)"/>
    </radialGradient>

    <!-- Big halo for the orb -->
    <radialGradient id="orbHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgb(147,150,255)" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="rgb(99,102,241)" stop-opacity="0.40"/>
      <stop offset="50%" stop-color="rgb(16,185,129)" stop-opacity="0.22"/>
      <stop offset="80%" stop-color="rgb(245,158,11)" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="rgb(99,102,241)" stop-opacity="0"/>
    </radialGradient>

    <!-- Pearl orb inner -->
    <radialGradient id="orbPearl" cx="35%" cy="28%" r="85%">
      <stop offset="0%" stop-color="rgb(255,255,255)" stop-opacity="1"/>
      <stop offset="25%" stop-color="rgb(245,248,255)" stop-opacity="1"/>
      <stop offset="55%" stop-color="rgb(225,232,250)" stop-opacity="1"/>
      <stop offset="85%" stop-color="rgb(200,212,242)" stop-opacity="1"/>
      <stop offset="100%" stop-color="rgb(180,195,232)" stop-opacity="1"/>
    </radialGradient>

    <!-- Specular -->
    <radialGradient id="orbSpecular" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Result glow (the 8x+) -->
    <radialGradient id="resultGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgb(16,185,129)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="rgb(16,185,129)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- White background -->
  <rect width="1200" height="640" fill="#ffffff"/>

  <!-- ============ TITLE ============ -->
  <text x="600" y="55" text-anchor="middle"
        font-family="'Space Grotesk', Inter, system-ui, sans-serif"
        font-size="26" font-weight="700" fill="rgb(30,27,75)">
    The new math of agentic memory
  </text>
  <text x="600" y="85" text-anchor="middle"
        font-family="'Space Grotesk', Inter, system-ui, sans-serif"
        font-size="14" font-style="italic" fill="rgb(100,116,139)">
    model capability × memory architecture
  </text>

  <!-- ============ EQUATION ============ -->
  <!-- Centers: Claude@180, plus@350, orb@520, equals@690, result@920 -->

  <!-- Claude mark (left side) -->
  <g transform="translate(120, 200) scale(1.6)">
    <circle cx="50" cy="50" r="60" fill="rgb(255,247,240)" stroke="rgb(201,100,66)" stroke-width="1.5" stroke-opacity="0.3"/>
    <path fill="#C96442" transform="scale(0.8) translate(12, 12)" d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9-4.7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2-2 .2-3 1-1 8-5.5Z"/>
  </g>
  <text x="200" y="380" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="20" font-weight="700" fill="rgb(71,85,105)">Claude</text>
  <text x="200" y="404" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="11" fill="rgb(148,163,184)">single-session ceiling</text>

  <!-- Plus sign -->
  <text x="358" y="290" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="90" font-weight="300" fill="rgb(148,163,184)">+</text>

  <!-- Bella orb (center) -->
  <g>
    <!-- halo -->
    <circle cx="520" cy="270" r="120" fill="url(#orbHalo)"/>
    <!-- pearl body -->
    <circle cx="520" cy="270" r="78" fill="url(#orbPearl)" stroke="rgb(120,130,175)" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- delta rings -->
    <circle cx="520" cy="270" r="78" fill="none" stroke="rgb(79,82,221)" stroke-width="1.0" stroke-opacity="0.5" stroke-dasharray="3,3"/>
    <circle cx="520" cy="270" r="58" fill="none" stroke="rgb(10,155,100)" stroke-width="1.0" stroke-opacity="0.45" stroke-dasharray="3,3"/>
    <circle cx="520" cy="270" r="38" fill="none" stroke="rgb(210,130,5)" stroke-width="1.0" stroke-opacity="0.4" stroke-dasharray="3,3"/>
    <!-- specular -->
    <ellipse cx="497" cy="242" rx="28" ry="18" fill="url(#orbSpecular)"/>

    <!-- belief graph inside (more nodes since bigger orb) -->
    <g>
      <!-- edges -->
      <line x1="490" y1="250" x2="520" y2="270" stroke="rgb(79,82,221)" stroke-opacity="0.85" stroke-width="1.6"/>
      <line x1="520" y1="270" x2="551" y2="248" stroke="rgb(10,155,100)" stroke-opacity="0.85" stroke-width="1.6"/>
      <line x1="520" y1="270" x2="495" y2="302" stroke="rgb(210,130,5)" stroke-opacity="0.75" stroke-width="1.6"/>
      <line x1="520" y1="270" x2="550" y2="298" stroke="rgb(100,116,139)" stroke-opacity="0.7" stroke-width="1.3"/>
      <line x1="490" y1="250" x2="495" y2="302" stroke="rgb(100,116,139)" stroke-opacity="0.4" stroke-width="1.1"/>
      <line x1="551" y1="248" x2="550" y2="298" stroke="rgb(100,116,139)" stroke-opacity="0.4" stroke-width="1.1"/>
      <line x1="490" y1="250" x2="551" y2="248" stroke="rgb(100,116,139)" stroke-opacity="0.35" stroke-width="1"/>

      <!-- nodes -->
      <circle cx="490" cy="250" r="7" fill="url(#nIndigo)" stroke="rgb(40,42,100)" stroke-width="0.7"/>
      <circle cx="551" cy="248" r="7" fill="url(#nTeal)" stroke="rgb(5,80,55)" stroke-width="0.7"/>
      <circle cx="520" cy="270" r="8.5" fill="url(#nAmber)" stroke="rgb(110,70,0)" stroke-width="0.7"/>
      <circle cx="495" cy="302" r="6" fill="url(#nAmber)" stroke="rgb(110,70,0)" stroke-width="0.7"/>
      <circle cx="550" cy="298" r="6" fill="url(#nIndigo)" stroke="rgb(40,42,100)" stroke-width="0.7"/>

      <!-- specular highlights on nodes -->
      <circle cx="489" cy="248.5" r="1.5" fill="white" fill-opacity="0.85"/>
      <circle cx="550" cy="246.5" r="1.5" fill="white" fill-opacity="0.85"/>
      <circle cx="519" cy="268" r="1.8" fill="white" fill-opacity="0.85"/>
    </g>

    <!-- twinkles -->
    <g fill="white" fill-opacity="0.8">
      <circle cx="440" cy="225" r="1.4"/>
      <circle cx="605" cy="235" r="1.2"/>
      <circle cx="425" cy="295" r="1.1"/>
      <circle cx="615" cy="305" r="1.3"/>
      <circle cx="450" cy="340" r="1.0"/>
      <circle cx="590" cy="340" r="1.1"/>
    </g>
  </g>
  <text x="520" y="420" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="20" font-weight="700" fill="rgb(10,155,100)">Bella</text>
  <text x="520" y="444" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="11" fill="rgb(148,163,184)">persistent belief graph</text>

  <!-- Greater-than operator (replaces equals) -->
  <text x="685" y="300" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="90" font-weight="300" fill="rgb(10,155,100)">&gt;</text>

  <!-- Result: 8x with glow -->
  <g>
    <ellipse cx="960" cy="270" rx="200" ry="140" fill="url(#resultGlow)"/>
    <text x="960" y="310" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="160" font-weight="800" fill="rgb(10,155,100)"
          letter-spacing="-4">8×</text>
  </g>
  <text x="960" y="380" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="20" font-weight="700" fill="rgb(10,155,100)">effective context</text>
  <text x="960" y="404" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="11" fill="rgb(148,163,184)">sustained across sessions</text>

  <!-- ============ METRIC STRIP ============ -->
  <line x1="100" y1="480" x2="1100" y2="480"
        stroke="#e2e8f0" stroke-width="1"/>

  <g transform="translate(0,500)">
    <!-- Metric 1: compression -->
    <text x="260" y="24" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="34" font-weight="800" fill="rgb(10,155,100)">18× median</text>
    <text x="260" y="48" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="12" fill="rgb(100,116,139)">compression · 15 real Claude Code projects</text>

    <!-- Metric 2: retention -->
    <text x="600" y="24" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="34" font-weight="800" fill="rgb(10,155,100)">11× retention</text>
    <text x="600" y="48" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="12" fill="rgb(100,116,139)">92% vs /compact's 8% · same bench</text>

    <!-- Metric 3: horizon -->
    <text x="940" y="24" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="34" font-weight="800" fill="rgb(10,155,100)">no rot</text>
    <text x="940" y="48" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="12" fill="rgb(100,116,139)">indefinite multi-session coherence</text>
  </g>

  <!-- Footer -->
  <text x="600" y="620" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="12" fill="rgb(148,163,184)">
    github.com/immartian/bellamem · an applied instance of Recursive Emergence
  </text>
</svg>
