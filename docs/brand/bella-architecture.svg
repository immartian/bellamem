<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="720" height="341" role="img" aria-labelledby="title desc">
  <title id="title">Bella architecture</title>
  <desc id="desc">Three-panel architecture: session history as stacked chunks with thin shared bands between them, the context window as a terminal in the middle, and the belief hypergraph as an isometric wireframe cube of nodes on the right. Arrows show history flowing into the window, and Bella extracting structure from the window and feeding packs back into it.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgb(107,114,128)"/>
    </marker>
    <radialGradient id="nIndigo" cx="35%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="rgb(147,150,255)"/>
      <stop offset="100%" stop-color="rgb(79,82,221)"/>
    </radialGradient>
    <radialGradient id="nTeal" cx="35%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="rgb(60,225,175)"/>
      <stop offset="100%" stop-color="rgb(10,155,100)"/>
    </radialGradient>
    <radialGradient id="nAmber" cx="35%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="rgb(255,200,90)"/>
      <stop offset="100%" stop-color="rgb(210,130,5)"/>
    </radialGradient>
  </defs>

  <!-- ============ Panel 1: Session history ============ -->
  <text x="110" y="28" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgb(71,85,105)">Session history</text>
  <text x="110" y="46" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="11" fill="rgb(148,163,184)">flat chunks, one per session</text>

  <g>
    <rect x="25" y="65" width="170" height="40" rx="4" fill="rgb(243,244,246)" stroke="rgb(148,163,184)" stroke-width="1"/>
    <line x1="40" y1="78" x2="175" y2="78" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="88" x2="155" y2="88" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="98" x2="170" y2="98" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>

    <rect x="60" y="108" width="100" height="4" fill="rgb(148,163,184)" opacity="0.45"/>

    <rect x="25" y="115" width="170" height="40" rx="4" fill="rgb(243,244,246)" stroke="rgb(148,163,184)" stroke-width="1"/>
    <line x1="40" y1="128" x2="175" y2="128" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="138" x2="160" y2="138" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="148" x2="170" y2="148" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>

    <rect x="60" y="158" width="100" height="4" fill="rgb(148,163,184)" opacity="0.45"/>

    <rect x="25" y="165" width="170" height="40" rx="4" fill="rgb(243,244,246)" stroke="rgb(148,163,184)" stroke-width="1"/>
    <line x1="40" y1="178" x2="175" y2="178" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="188" x2="155" y2="188" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="198" x2="165" y2="198" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>

    <rect x="60" y="208" width="100" height="4" fill="rgb(148,163,184)" opacity="0.45"/>

    <rect x="25" y="215" width="170" height="40" rx="4" fill="rgb(243,244,246)" stroke="rgb(148,163,184)" stroke-width="1"/>
    <line x1="40" y1="228" x2="175" y2="228" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="238" x2="160" y2="238" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
    <line x1="40" y1="248" x2="170" y2="248" stroke="rgb(148,163,184)" stroke-width="1.2" opacity="0.55"/>
  </g>

  <!-- Arrow 1: history -> window -->
  <line x1="200" y1="160" x2="275" y2="160" stroke="rgb(107,114,128)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ Panel 2: Working memory (terminal) ============ -->
  <text x="385" y="28" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgb(71,85,105)">Working memory</text>
  <text x="385" y="46" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="11" fill="rgb(148,163,184)">the context window</text>

  <rect x="285" y="65" width="200" height="190" rx="6" fill="rgb(24,24,27)" stroke="rgb(63,63,70)" stroke-width="1"/>
  <path d="M 291 65 L 479 65 Q 485 65 485 71 L 485 84 L 285 84 L 285 71 Q 285 65 291 65 Z" fill="rgb(39,39,42)"/>
  <circle cx="296" cy="74.5" r="3" fill="rgb(239,68,68)"/>
  <circle cx="306" cy="74.5" r="3" fill="rgb(250,204,21)"/>
  <circle cx="316" cy="74.5" r="3" fill="rgb(34,197,94)"/>

  <g font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace" font-size="9" fill="rgb(161,161,170)">
    <text x="294" y="102"><tspan fill="rgb(148,163,184)">$</tspan> claude-code</text>
    <text x="294" y="116"><tspan fill="rgb(148,163,184)">user:</tspan> test flaked again</text>
    <text x="294" y="130"><tspan fill="rgb(148,163,184)">asst:</tspan> bumping timeout?</text>
    <text x="294" y="144"><tspan fill="rgb(148,163,184)">user:</tspan> that's a bandaid</text>
    <text x="294" y="158"><tspan fill="rgb(148,163,184)">asst:</tspan> tracing retry.py</text>
    <text x="294" y="172"><tspan fill="rgb(148,163,184)">user:</tspan> CI load?</text>
    <text x="294" y="186"><tspan fill="rgb(148,163,184)">asst:</tspan> rate-limiter hit</text>
    <text x="294" y="200"><tspan fill="rgb(148,163,184)">user:</tspan> fix = retry jitter</text>
    <text x="294" y="214"><tspan fill="rgb(148,163,184)">asst:</tspan> patching ± 50ms</text>
    <text x="294" y="228"><tspan fill="rgb(148,163,184)">user:</tspan> good</text>
    <text x="294" y="244" fill="rgb(34,197,94)">▊</text>
  </g>

  <!-- Arrow 2a: window -> cube (extract) -->
  <line x1="495" y1="130" x2="560" y2="108" stroke="rgb(107,114,128)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="528" y="104" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="10" font-style="italic" fill="rgb(107,114,128)">extract</text>

  <!-- Arrow 2b: cube -> window (retrieve) -->
  <line x1="560" y1="200" x2="495" y2="178" stroke="rgb(107,114,128)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="528" y="212" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="10" font-style="italic" fill="rgb(107,114,128)">retrieve</text>

  <!-- ============ Panel 3: Belief hypergraph cube ============ -->
  <text x="650" y="28" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgb(71,85,105)">Belief hypergraph</text>
  <text x="650" y="46" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="11" fill="rgb(148,163,184)">Bella's long-term store</text>

  <!-- Cube wireframe -->
  <g stroke="rgb(100,116,139)" stroke-width="1.2" fill="none">
    <!-- Front face (visible, solid) -->
    <line x1="565" y1="250" x2="705" y2="250"/>
    <line x1="705" y1="250" x2="705" y2="110"/>
    <line x1="705" y1="110" x2="565" y2="110"/>
    <line x1="565" y1="110" x2="565" y2="250"/>
    <!-- Visible back edges (top-back and right-back) -->
    <line x1="740" y1="215" x2="740" y2="75"/>
    <line x1="740" y1="75" x2="600" y2="75"/>
    <!-- Visible connecting edges (top-right, top-left, bottom-right) -->
    <line x1="705" y1="250" x2="740" y2="215"/>
    <line x1="705" y1="110" x2="740" y2="75"/>
    <line x1="565" y1="110" x2="600" y2="75"/>
    <!-- Hidden edges (dashed, low opacity) -->
    <line x1="600" y1="215" x2="740" y2="215" stroke-dasharray="3,3" opacity="0.45"/>
    <line x1="600" y1="75"  x2="600" y2="215" stroke-dasharray="3,3" opacity="0.45"/>
    <line x1="565" y1="250" x2="600" y2="215" stroke-dasharray="3,3" opacity="0.45"/>
  </g>

  <!-- Belief edges inside the cube -->
  <g stroke-linecap="round" fill="none" stroke-width="1.2">
    <line x1="598" y1="147" x2="607" y2="166" stroke="rgb(99,102,241)" stroke-opacity="0.65"/>
    <line x1="626" y1="203" x2="607" y2="166" stroke="rgb(99,102,241)" stroke-opacity="0.45"/>
    <line x1="670" y1="124" x2="710" y2="154" stroke="rgb(16,185,129)" stroke-opacity="0.40"/>
    <line x1="710" y1="154" x2="677" y2="194" stroke="rgb(16,185,129)" stroke-opacity="0.40"/>
    <line x1="670" y1="124" x2="677" y2="194" stroke="rgb(16,185,129)" stroke-opacity="0.22"/>
    <line x1="644" y1="199" x2="646" y2="135" stroke="rgb(245,158,11)" stroke-opacity="0.30"/>
    <line x1="644" y1="199" x2="626" y2="203" stroke="rgb(148,163,184)" stroke-opacity="0.65"/>
    <line x1="670" y1="124" x2="646" y2="135" stroke="rgb(148,163,184)" stroke-opacity="0.60"/>
    <line x1="598" y1="147" x2="646" y2="135" stroke="rgb(148,163,184)" stroke-opacity="0.40"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="598" cy="147" r="4"   fill="url(#nIndigo)"/>
    <circle cx="670" cy="124" r="3.2" fill="url(#nTeal)"/>
    <circle cx="644" cy="199" r="4"   fill="url(#nAmber)"/>
    <circle cx="626" cy="203" r="3.2" fill="url(#nIndigo)"/>
    <circle cx="710" cy="154" r="3.2" fill="url(#nTeal)"/>
    <circle cx="646" cy="135" r="3.2" fill="url(#nAmber)"/>
    <circle cx="607" cy="166" r="3.2" fill="url(#nIndigo)"/>
    <circle cx="677" cy="194" r="4"   fill="url(#nTeal)"/>
  </g>

  <!-- Caption below all panels -->
  <text x="380" y="325" text-anchor="middle" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="11" fill="rgb(100,116,139)">Each session flows through the window. Bella extracts its structure and feeds a pack back when the next session starts.</text>
</svg>
