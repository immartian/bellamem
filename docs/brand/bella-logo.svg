      <line x1="82" y1="25" x2="58" y2="87" stroke="rgb(99,102,241)" stroke-opacity="0.32"/>
      <line x1="30" y1="70" x2="58" y2="87" stroke="rgb(99,102,241)" stroke-opacity="0.52"/>
      <line x1="22" y1="37" x2="85" y2="50" stroke="rgb(16,185,129)" stroke-opacity="0.32"/>
      <line x1="85" y1="50" x2="68" y2="73" stroke="rgb(16,185,129)" stroke-opacity="0.54"/>
      <line x1="55" y1="20" x2="42" y2="50" stroke="rgb(245,158,11)" stroke-opacity="0.52"/>
      <line x1="68" y1="73" x2="58" y2="87" stroke="rgb(148,163,184)" stroke-opacity="0.68"/>
      <line x1="42" y1="50" x2="30" y2="70" stroke="rgb(148,163,184)" stroke-opacity="0.65"/>
      <line x1="82" y1="25" x2="85" y2="50" stroke="rgb(148,163,184)" stroke-opacity="0.62"/>
      <line x1="55" y1="20" x2="82" y2="25" stroke="rgb(148,163,184)" stroke-opacity="0.60"/>
      <line x1="22" y1="37" x2="30" y2="70" stroke="rgb(148,163,184)" stroke-opacity="0.50"/>
      <line x1="42" y1="50" x2="68" y2="73" stroke="rgb(148,163,184)" stroke-opacity="0.50"/>
