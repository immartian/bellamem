<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="640" height="240" role="img" aria-labelledby="title desc">
  <title id="title">Bella</title>
  <desc id="desc">Bella logo: belief hypergraph mark and wordmark.</desc>

  <defs>
    <radialGradient id="haloIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgb(99,102,241)" stop-opacity="0.60"/>
      <stop offset="45%"  stop-color="rgb(99,102,241)" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="rgb(99,102,241)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgb(16,185,129)" stop-opacity="0.60"/>
      <stop offset="45%"  stop-color="rgb(16,185,129)" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="rgb(16,185,129)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgb(245,158,11)" stop-opacity="0.60"/>
      <stop offset="45%"  stop-color="rgb(245,158,11)" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="rgb(245,158,11)" stop-opacity="0"/>
    </radialGradient>
  </defs>

