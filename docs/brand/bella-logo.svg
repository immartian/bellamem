      <circle cx="82" cy="25" r="12" fill="url(#haloIndigo)"/>
      <circle cx="22" cy="37" r="12" fill="url(#haloTeal)"/>
      <circle cx="42" cy="50" r="13" fill="url(#haloAmber)"/>
      <circle cx="85" cy="50" r="16" fill="url(#haloTeal)"/>
      <circle cx="30" cy="70" r="12" fill="url(#haloIndigo)"/>
      <circle cx="68" cy="73" r="12" fill="url(#haloTeal)"/>
      <circle cx="58" cy="87" r="16" fill="url(#haloIndigo)"/>
    </g>
    <g>
      <circle cx="55" cy="20" r="4.4" fill="rgb(245,158,11)"/>
      <circle cx="82" cy="25" r="3.2" fill="rgb(99,102,241)"/>
      <circle cx="22" cy="37" r="3.2" fill="rgb(16,185,129)"/>
      <circle cx="42" cy="50" r="3.4" fill="rgb(245,158,11)"/>
      <circle cx="85" cy="50" r="4.2" fill="rgb(16,185,129)"/>
      <circle cx="30" cy="70" r="3.2" fill="rgb(99,102,241)"/>
      <circle cx="68" cy="73" r="3.2" fill="rgb(16,185,129)"/>
      <circle cx="58" cy="87" r="4.2" fill="rgb(99,102,241)"/>
    </g>
    <g fill="white" fill-opacity="0.75">
      <circle cx="53.6" cy="18.6" r="1.5"/>
      <circle cx="80.9" cy="23.9" r="1.0"/>
      <circle cx="20.9" cy="35.9" r="1.0"/>
      <circle cx="40.9" cy="48.9" r="1.1"/>
      <circle cx="83.7" cy="48.7" r="1.4"/>
      <circle cx="28.9" cy="68.9" r="1.0"/>
      <circle cx="66.9" cy="71.9" r="1.0"/>
      <circle cx="56.7" cy="85.7" r="1.4"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <text x="128" y="78"
        font-family="'Space Grotesk', Inter, 'Helvetica Neue', system-ui, -apple-system, sans-serif"
        font-size="62"
        font-weight="600"
        letter-spacing="-1.5"
        fill="rgb(30,27,75)">Bella</text>
</svg>
