<html lang="en">
<head>
<meta charset="UTF-8">
<title>bellamem v0.2 — concept map (Cytoscape)</title>

<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
  :root {
    --bg: #0b1220;
    --panel: #111827;
    --panel2: #1f2937;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #a78bfa;
    /* nature hues — fill */
    --n-metaphysical: #f59e0b; /* amber — what the system IS */
    --n-normative:    #3b82f6; /* blue — what we commit to */
    --n-factual:      #10b981; /* green — measurable */
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { display: flex; height: 100vh; }
  #graph-pane { flex: 1; position: relative; }
  #cy { width: 100%; height: 100%; background: radial-gradient(ellipse at center, #0f172a 0%, #020617 100%); }
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px; pointer-events: none;
    background: linear-gradient(180deg, rgba(11,18,32,0.95), rgba(11,18,32,0));
  }
  #title { font-size: 14px; font-weight: 600; }
  #stats { font-size: 11px; color: var(--muted); margin-top: 4px; }
  #stats b { color: var(--text); }
  #legend {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(17,24,39,0.9); border-radius: 6px; padding: 10px 12px;
    font-size: 10px; line-height: 1.5; color: var(--muted);
    border: 1px solid var(--panel2); max-width: 280px;
  }
  #legend h4 { margin: 0 0 4px 0; color: var(--text); font-size: 10px;
               text-transform: uppercase; letter-spacing: 1px; }
  #legend .group { margin-bottom: 8px; }
  #legend .row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  #legend .chip { width: 12px; height: 12px; display: inline-block; flex-shrink: 0; }
  #legend .chip.circle { border-radius: 50%; }
  #legend .chip.hex { clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }
  #legend .chip.diamond { transform: rotate(45deg); }
  #legend .chip.square { border-radius: 3px; }
  #search {
    position: absolute; top: 12px; right: 12px;
    background: var(--panel); border: 1px solid var(--panel2); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; width: 220px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #controls {
    position: absolute; top: 52px; right: 12px;
    background: rgba(17,24,39,0.9); border: 1px solid var(--panel2);
    border-radius: 6px; padding: 6px 10px; font-size: 11px;
    display: flex; gap: 10px; align-items: center;
  }
  #controls button {
    background: var(--panel2); border: none; color: var(--text);
    padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px;
  }
  #controls button:hover { background: #374151; }
  #sidebar {
    width: 360px; background: var(--panel); border-left: 1px solid var(--panel2);
    overflow-y: auto; padding: 16px; display: none; position: relative;
  }
  #sidebar.open { display: block; }
  #sidebar h2 { font-size: 14px; margin: 0 0 6px 0; line-height: 1.3; }
  #sidebar .tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  #sidebar .tag {
    font-size: 10px; padding: 2px 6px; border-radius: 10px;
    background: var(--panel2); color: var(--text); text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap;
  }
  #sidebar .mass-bar {
    height: 4px; background: var(--panel2); border-radius: 2px; margin: 8px 0 14px 0;
    overflow: hidden;
  }
  #sidebar .mass-fill { height: 100%; background: var(--accent); }
  #sidebar .section { margin-top: 14px; }
  #sidebar .section h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 6px 0;
  }
  #sidebar ul { padding-left: 18px; margin: 0; }
  #sidebar li { font-size: 12px; line-height: 1.4; margin-bottom: 3px; word-break: break-word; }
  #sidebar .edge-row { font-size: 11px; padding: 3px 0 3px 6px; border-left: 2px solid var(--panel2); margin-bottom: 2px; }
  #sidebar .edge-row.type-support { border-left-color: #94a3b8; }
  #sidebar .edge-row.type-elaborate { border-left-color: #22c55e; }
  #sidebar .edge-row.type-cause { border-left-color: #06b6d4; }
  #sidebar .edge-row.type-dispute { border-left-color: #ef4444; }
  #sidebar .edge-row .arrow { color: var(--muted); margin: 0 4px; }
  #sidebar .edge-row a { color: var(--text); cursor: pointer; text-decoration: underline; }
  #sidebar .close-x {
    position: absolute; top: 10px; right: 14px; cursor: pointer;
    font-size: 20px; color: var(--muted); user-select: none;
  }
  #sidebar .close-x:hover { color: var(--text); }
  #sidebar .preview {
    background: var(--panel2); padding: 8px; border-radius: 4px;
    font-family: ui-monospace, monospace; font-size: 10px; line-height: 1.4;
    color: var(--muted); white-space: pre-wrap; word-break: break-word;
  }
</style>
</head>

      </div>
      <div class="group">
        <h4>size = mass · dot = turn-hub</h4>
      </div>
    </div>
  </div>
  <div id="sidebar">

    <h2 id="s-topic"></h2>

      </div>
    </div>
    <div class="section">

    </div>
    <div class="section">
      <h3>sources (<span id="s-src-count"></span>)</h3>
      <ul id="s-sources"></ul>
    </div>
    <div class="section">
      <h3>edges</h3>
      <div id="s-edges"></div>
    </div>
  </div>
</div>

,"target":"measuring-graph-quality","voices":["assistant"],"confidence":"medium"},{"id":"8f608a06ff94ba17","type":"support","source":"smoke-test-against-real-graph","target":"test-and-repair-live-graph","voices":["assistant"],"confidence":"medium"},{"id":"7632c8df188c648d","type":"cause","source":"commit-prompt-rework","target":"all-proto-tests-green","voices":["assistant"],"confidence":"high"},{"id":"c8167b1b38060ba0","type":"elaborate","source":"bellamem-v0-2-graph-resume","target":"current-concept-metrics","voices":["assistant"],"confidence":"high"},{"id":"56d28ad53dd52765","type":"support","source":"current-concept-metrics","target":"bellamem-v0-2-graph-resume","voices":["assistant"],"confidence":"medium"}],"turns":[],"turn_edges":[]};

function truncate(s, n) {
  if (!s) return "";
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

// Build graph elements: concepts + turn hubs + edges (cc + hub→concept).
const elements = [];
for (const c of PAYLOAD.concepts) {
  elements.push({
    group: "nodes",
    data: {
      id: c.id,
      kind: "concept",
      label: c.topic,
      cls: c.class,
      nature: c.nature,
      state: c.state || "",
      mass: c.mass,
      full: c,
    },
    classes: `kind-concept cls-${c.class} nat-${c.nature}${c.state ? " state-" + c.state : ""}`,
  });
}
for (const t of PAYLOAD.turns) {
  elements.push({
    group: "nodes",
    data: {
      id: "turn:" + t.id,
      kind: "turn",
      label: "",
      full: t,
    },
    classes: "kind-turn",
  });
}
for (const e of PAYLOAD.edges) {
  elements.push({
    group: "edges",
    data: {
      id: "cc:" + e.id,
      source: e.source,
      target: e.target,
      type: e.type,
      label: e.type,
      kind: "structural",
      full: e,
    },
    classes: `kind-structural type-${e.type}`,
  });
}
for (const e of PAYLOAD.turn_edges) {
  elements.push({
    group: "edges",
    data: {
      id: "hyp:" + e.id,
      source: "turn:" + e.source,
      target: e.target,
      type: e.type,
      kind: "hyperedge",
      full: e,
    },
    classes: "kind-hyperedge",
  });
}

const style = [
  // Concept nodes — base
  {
    selector: "node.kind-concept",
    style: {
      "label": "data(label)",
      "text-wrap": "wrap",
      "text-max-width": "140px",
      "font-size": "10px",
      "font-family": "-apple-system, sans-serif",
      "text-valign": "bottom",
      "text-halign": "center",
      "text-margin-y": 6,
      "color": "#e5e7eb",
      "text-outline-color": "#0b1220",
      "text-outline-width": 2,
      "width": "mapData(mass, 0.5, 0.75, 20, 78)",
      "height": "mapData(mass, 0.5, 0.75, 20, 78)",
      "border-width": 2,
      "border-color": "#0b1220",
      "background-opacity": 0.95,
    },
  },

  // Shape by class
  { selector: "node.cls-invariant",   style: { "shape": "hexagon" } },
  { selector: "node.cls-decision",    style: { "shape": "diamond" } },
  { selector: "node.cls-observation", style: { "shape": "ellipse" } },
  { selector: "node.cls-ephemeral",   style: { "shape": "round-rectangle" } },

  // Color by nature
  { selector: "node.nat-metaphysical", style: { "background-color": "#f59e0b", "border-color": "#b45309" } },
  { selector: "node.nat-normative",    style: { "background-color": "#3b82f6", "border-color": "#1e3a8a" } },
  { selector: "node.nat-factual",      style: { "background-color": "#10b981", "border-color": "#065f46" } },

  // Ephemeral state
  { selector: "node.state-retracted", style: { "border-style": "dashed", "border-color": "#dc2626", "border-width": 3 } },
  { selector: "node.state-consumed",  style: { "border-color": "#86efac", "border-width": 3 } },
  { selector: "node.state-stale",     style: { "opacity": 0.35 } },

  // Selected
  { selector: "node:selected", style: { "border-color": "#fef3c7", "border-width": 4 } },
  { selector: "node.dimmed",   style: { "opacity": 0.12 } },
  { selector: "node.no-label", style: { "label": "" } },

  // Turn hubs — small grey dots, no label
  {
    selector: "node.kind-turn",
    style: {
      "shape": "ellipse",
      "width": 8,
      "height": 8,
      "background-color": "#6b7280",
      "border-width": 1,
      "border-color": "#111827",
      "label": "",
    },
  },
  { selector: "node.kind-turn:selected", style: { "background-color": "#fef3c7", "width": 12, "height": 12 } },
  { selector: "node.kind-turn.hidden", style: { "display": "none" } },

  // Structural edges (cc) — labeled with type
  {
    selector: "edge.kind-structural",
    style: {
      "label": "data(label)",
      "font-size": "8px",
      "color": "#cbd5e1",
      "text-background-color": "#0b1220",
      "text-background-opacity": 0.8,
      "text-background-padding": 2,
      "text-background-shape": "round-rectangle",
      "width": 1.8,
      "line-color": "#94a3b8",
      "target-arrow-color": "#94a3b8",
      "target-arrow-shape": "triangle",
      "curve-style": "bezier",
      "opacity": 0.85,
    },
  },
  { selector: "edge.kind-structural.type-support",   style: { "line-color": "#cbd5e1", "target-arrow-shape": "none", "width": 1.2 } },
  { selector: "edge.kind-structural.type-elaborate", style: { "line-color": "#22c55e", "target-arrow-color": "#22c55e", "line-style": "dashed" } },
  { selector: "edge.kind-structural.type-cause",     style: { "line-color": "#06b6d4", "target-arrow-color": "#06b6d4", "width": 2.5 } },
  { selector: "edge.kind-structural.type-dispute",   style: { "line-color": "#ef4444", "target-arrow-shape": "none", "width": 3 } },

  // Hyperedges (turn hub → concept) — thin unlabeled spokes
  {
    selector: "edge.kind-hyperedge",
    style: {
      "width": 1,
      "line-color": "#475569",
      "target-arrow-shape": "none",
      "curve-style": "straight",
      "opacity": 0.5,
    },
  },
  { selector: "edge.kind-hyperedge.hidden", style: { "display": "none" } },
];

const cy = cytoscape({
  container: document.getElementById("cy"),
  elements,
  style,
  layout: {
    name: "fcose",
    quality: "default",
    randomize: true,
    nodeRepulsion: 6500,
    idealEdgeLength: 90,
    edgeElasticity: 0.45,
    nestingFactor: 0.1,
    gravity: 0.25,
    gravityRange: 3.8,
    numIter: 2500,
    tile: false,
    animate: false,
    fit: true,
    padding: 40,
  },
  wheelSensitivity: 0.2,
  minZoom: 0.15,
  maxZoom: 3.0,
});

cy.on("tap", "node", evt => {
  const n = evt.target;
  if (n.data("kind") === "concept") selectConcept(n.data("full"));
  else if (n.data("kind") === "turn") selectTurn(n.data("full"));
});
cy.on("tap", evt => { if (evt.target === cy) closeSidebar(); });

function selectConcept(c) {
  document.getElementById("s-topic").textContent = c.topic;
  const tags = document.getElementById("s-tags");
  tags.innerHTML = "";
  [c.class, c.nature, c.state].filter(Boolean).forEach(t => {
    const el = document.createElement("span");
    el.className = "tag"; el.textContent = t; tags.appendChild(el);
  });
  document.getElementById("s-mass").style.width = `${Math.round(c.mass * 100)}%`;
  document.getElementById("s-turn-preview-wrap").style.display = "none";

  const voicesEl = document.getElementById("s-voices");
  voicesEl.innerHTML = c.voices.length
    ? c.voices.map(v => `<li>${v}</li>`).join("")
    : "<li style='color:var(--muted)'>none yet</li>";

  document.getElementById("s-src-count").textContent = c.source_refs.length;
  document.getElementById("s-sources").innerHTML =
    c.source_refs.slice(0, 20).map(sr => `<li><code style="font-size:10px">${sr}</code></li>`).join("");

  const related = PAYLOAD.edges.filter(e => e.source === c.id || e.target === c.id);
  const edgeEl = document.getElementById("s-edges");
  if (!related.length) {
    edgeEl.innerHTML = "<div style='font-size:11px;color:var(--muted)'>no structural edges</div>";
  } else {
    edgeEl.innerHTML = related.map(e => {
      const otherId = e.source === c.id ? e.target : e.source;
      const other = PAYLOAD.concepts.find(x => x.id === otherId);
      const arrow = e.source === c.id ? "→" : "←";
      return `<div class="edge-row type-${e.type}">
        <span style="color:var(--muted)">${e.type}</span>
        <span class="arrow">${arrow}</span>
        <a onclick="selectById('${otherId}')">${other ? truncate(other.topic, 36) : otherId}</a>
      </div>`;
    }).join("");
  }
  document.getElementById("sidebar").classList.add("open");
}

function selectTurn(t) {
  document.getElementById("s-topic").textContent = `turn ${t.id}`;
  const tags = document.getElementById("s-tags");
  tags.innerHTML = "";
  [t.speaker, t.session_id?.slice(0,8)].filter(Boolean).forEach(x => {
    const el = document.createElement("span");
    el.className = "tag"; el.textContent = x; tags.appendChild(el);
  });
  document.getElementById("s-mass").style.width = "0%";
  document.getElementById("s-turn-preview-wrap").style.display = "block";
  document.getElementById("s-preview").textContent = t.preview || "(no preview)";
  document.getElementById("s-voices").innerHTML = "";
  document.getElementById("s-src-count").textContent = "1";
  document.getElementById("s-sources").innerHTML =
    `<li><code style="font-size:10px">${t.id}</code></li>`;

  const spokes = PAYLOAD.turn_edges.filter(e => e.source === t.id);
  const edgeEl = document.getElementById("s-edges");
  edgeEl.innerHTML = spokes.map(e => {
    const other = PAYLOAD.concepts.find(x => x.id === e.target);
    return `<div class="edge-row type-${e.type}">
      <span style="color:var(--muted)">${e.type}</span>
      <span class="arrow">→</span>
      <a onclick="selectById('${e.target}')">${other ? truncate(other.topic, 36) : e.target}</a>
    </div>`;
  }).join("");
  document.getElementById("sidebar").classList.add("open");
}

function selectById(id) {
  const c = PAYLOAD.concepts.find(x => x.id === id);
  if (c) {
    selectConcept(c);
    const n = cy.getElementById(id);
    if (n && n.length) {
      cy.elements().unselect(); n.select();
      cy.animate({ center: { eles: n }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 300 });
    }
  }
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  cy.elements().unselect();
}

// Header stats
const m = PAYLOAD.meta;
document.getElementById("title-counts").textContent =
  `${m.n_concepts}/${m.n_total_concepts} concepts · ${PAYLOAD.turns.length} turn-hubs · ${m.n_edges} cc-edges · ${PAYLOAD.turn_edges.length} hyperedges`;
document.getElementById("stats").innerHTML =
  Object.entries(m.class_counts).map(([k, v]) => `<b>${v}</b> ${k}`).join(" · ");

// Controls
document.getElementById("btn-fit").onclick = () => cy.fit(null, 40);
document.getElementById("btn-relayout").onclick = () => {
  cy.layout({ name: "fcose", quality: "default", randomize: true,
              nodeRepulsion: 6500, idealEdgeLength: 90, numIter: 2500,
              animate: "end", animationDuration: 500, fit: true, padding: 40 }).run();
};
document.getElementById("toggle-hubs").onchange = (e) => {
  cy.nodes(".kind-turn").toggleClass("hidden", !e.target.checked);
  cy.edges(".kind-hyperedge").toggleClass("hidden", !e.target.checked);
};
document.getElementById("toggle-labels").onchange = (e) => {
  cy.nodes(".kind-concept").toggleClass("no-label", !e.target.checked);
};

// Search
const searchEl = document.getElementById("search");
searchEl.addEventListener("input", () => {
  const q = searchEl.value.trim().toLowerCase();
  cy.nodes(".kind-concept").forEach(n => {
    if (!q) { n.removeClass("dimmed"); return; }
    const topic = (n.data("full")?.topic || "").toLowerCase();
    n.toggleClass("dimmed", !topic.includes(q));
  });
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== searchEl) {
    e.preventDefault(); searchEl.focus();
  }
  if (e.key === "Escape") {
    closeSidebar(); searchEl.blur(); searchEl.value = "";
    searchEl.dispatchEvent(new Event("input"));
  }
});
</script>
</body>
</html>
