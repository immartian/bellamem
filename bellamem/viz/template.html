<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bellamem — {{BELIEFS}} beliefs</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a14; color: #e6e6f0; font-family: ui-monospace, Menlo, Consolas, monospace; overflow: hidden; }
  #hud { position: fixed; top: 10px; left: 10px; padding: 8px 10px; background: rgba(10, 10, 20, 0.7); border: 1px solid #2a2a44; border-radius: 4px; font-size: 11px; line-height: 1.5; max-width: 320px; }
  #hud h1 { margin: 0 0 6px 0; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }
  #hud .hint { color: #8a8ab0; margin-top: 6px; }
  #legend { position: fixed; top: 10px; right: 10px; padding: 8px 10px; background: rgba(10, 10, 20, 0.7); border: 1px solid #2a2a44; border-radius: 4px; font-size: 11px; max-height: 80vh; overflow-y: auto; }
  #legend .swatch { display: inline-block; width: 10px; height: 10px; margin-right: 6px; vertical-align: middle; border-radius: 2px; }
  #legend .field { margin: 2px 0; }
  #legend .count { color: #8a8ab0; margin-left: 4px; }
  #legend h2 { margin: 0 0 6px 0; font-size: 11px; font-weight: 600; color: #c0c0e0; }
  #tooltip { position: fixed; padding: 6px 10px; background: rgba(8, 8, 16, 0.95); border: 1px solid #4a4a6a; border-radius: 4px; font-size: 11px; line-height: 1.5; pointer-events: none; display: none; max-width: 360px; z-index: 10; }
  #tooltip .field-tag { color: #8ab4ff; font-weight: 600; }
  #tooltip .mass { color: #ffd43b; }
  #tooltip .voices { color: #94d82d; }
  #playbar { position: fixed; left: 10px; right: 10px; bottom: 10px; padding: 8px 12px; background: rgba(10, 10, 20, 0.85); border: 1px solid #2a2a44; border-radius: 4px; display: flex; align-items: center; gap: 12px; font-size: 11px; z-index: 5; }
  #playbtn { background: #4c9aff; color: #fff; border: none; padding: 6px 14px; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; min-width: 96px; }
  #playbtn:hover { background: #6bafff; }
  #playbtn.live { background: #2a2a44; color: #8a8ab0; }
  #scrub { flex: 1; accent-color: #4c9aff; }
  #timelabel { color: #c0c0e0; min-width: 120px; font-variant-numeric: tabular-nums; text-align: right; }
  #speedlabel { color: #8a8ab0; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="hud">
  <h1>bellamem {{BELLAMEM_VERSION}}</h1>
  <div>{{BELIEFS}} beliefs · {{FIELDS}} fields</div>
  <div class="hint">drag: rotate · right-drag: pan · wheel: zoom · hover: inspect</div>
</div>
<div id="legend"><h2>fields</h2></div>
<div id="tooltip"></div>
<div id="playbar">
  <button id="playbtn" class="live">▶ replay</button>
  <input type="range" id="scrub" min="0" max="1000" value="1000" step="1">
  <span id="timelabel">live · now</span>
</div>

<script id="graph-data" type="application/json">{{DATA_JSON}}</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const data = JSON.parse(document.getElementById('graph-data').textContent);

// ----- scene -----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);
scene.fog = new THREE.Fog(0x0a0a14, 60, 140);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 25, 55);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 5, 0);

// ----- lighting -----
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 0.7);
key.position.set(20, 40, 20);
scene.add(key);
const rim = new THREE.DirectionalLight(0x6688ff, 0.35);
rim.position.set(-20, 10, -20);
scene.add(rim);

// ----- ground grid (mass=0 reference plane) -----
const grid = new THREE.GridHelper(80, 40, 0x2a2a44, 0x14142a);
grid.position.y = 0;
scene.add(grid);

// ----- field colors -----
const fieldColor = new Map();
for (const f of data.fields) {
  fieldColor.set(f.name, new THREE.Color(f.color));
}

// ----- legend -----
const legend = document.getElementById('legend');
for (const f of data.fields) {
  const row = document.createElement('div');
  row.className = 'field';
  row.innerHTML = `<span class="swatch" style="background:${f.color}"></span>${f.name}<span class="count">×${f.belief_count}</span>`;
  legend.appendChild(row);
}

// ----- beliefs → spheres -----
// Height scale: mass ranges 0..1, we lift by HEIGHT_SCALE so the
// tallest peak is ~12 units above the grid. Ratified decisions
// (mass ≥ 0.75) become clearly visible against the floor band.
const HEIGHT_SCALE = 14;
const sphereGeom = new THREE.SphereGeometry(0.35, 14, 10);

const beliefById = new Map();
const meshes = [];
for (const b of data.beliefs) {
  const color = fieldColor.get(b.field) || new THREE.Color(0x888899);
  const mat = new THREE.MeshLambertMaterial({
    color,
    transparent: true,
    opacity: 0.45 + 0.55 * b.mass,
  });
  const mesh = new THREE.Mesh(sphereGeom, mat);
  mesh.position.set(b.pos[0], b.z * HEIGHT_SCALE, b.pos[1]);
  // Radius scales with evidence count (log — otherwise a single
  // ratified decision dominates).
  const s = 0.7 + 0.35 * Math.log2(1 + b.voices);
  mesh.scale.setScalar(s);
  mesh.userData = b;
  scene.add(mesh);
  meshes.push(mesh);
  beliefById.set(b.id, mesh);
}

// ----- edges → lines -----
// Colors are deliberately distinct so dispute geometry pops out:
//   support: muted gray-blue, low opacity
//   cause:   cyan-blue, medium opacity
//   counter: red, higher opacity (disputes are the interesting thing)
// edgeLines keeps (edge, line) pairs so replay can toggle visibility
// and refresh geometry as endpoint Y positions change over time.
const edgeStyle = {
  support: { color: 0x444466, opacity: 0.35 },
  cause:   { color: 0x55aaff, opacity: 0.70 },
  counter: { color: 0xff5577, opacity: 0.80 },
};
const edgeLines = [];
for (const e of data.edges) {
  const a = beliefById.get(e.from);
  const b = beliefById.get(e.to);
  if (!a || !b) continue;
  const style = edgeStyle[e.type] || edgeStyle.support;
  // Preallocate a 2-point buffer geometry we mutate in updateFrame
  // during replay — cheaper than recreating geometry per frame.
  const pos = new Float32Array([
    a.position.x, a.position.y, a.position.z,
    b.position.x, b.position.y, b.position.z,
  ]);
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.LineBasicMaterial({
    color: style.color,
    transparent: true,
    opacity: style.opacity,
  });
  const line = new THREE.Line(geom, mat);
  scene.add(line);
  edgeLines.push({ edge: e, line, meshA: a, meshB: b });
}

// ----- replay: per-belief log-odds trajectories -----
// Compressed wall-clock timeline is shipped in data.timeline. We
// reconstruct each belief's log_odds path so getMassAtTime(b, t)
// can interpolate on the fly without mutating shared state.
//
//   current_log_odds = logit(b.mass)
//   initial_log_odds = current_log_odds - sum(kept_deltas)
//
// Beliefs whose earliest jumps were dropped by JUMPS_MAX start at
// a nonzero initial value — that keeps replay honest instead of
// pretending unretained history was zero-mass.
const LOG_ODDS_CLAMP = 6.0;  // ±6 ≈ mass ∈ [0.0025, 0.9975]
function logit(m) {
  const clamped = Math.max(1e-4, Math.min(1 - 1e-4, m));
  return Math.log(clamped / (1 - clamped));
}
function sigmoid(x) {
  if (x >= LOG_ODDS_CLAMP) return 1 / (1 + Math.exp(-LOG_ODDS_CLAMP));
  if (x <= -LOG_ODDS_CLAMP) return 1 / (1 + Math.exp(LOG_ODDS_CLAMP));
  return 1 / (1 + Math.exp(-x));
}

const timeline = data.timeline || { duration: 0, events: [] };
const duration = timeline.duration;

// Bucket events by belief id in a single pass.
const eventsByBelief = new Map();
for (const ev of timeline.events) {
  let arr = eventsByBelief.get(ev.id);
  if (!arr) { arr = []; eventsByBelief.set(ev.id, arr); }
  arr.push(ev);
}

// Per-belief trajectory: array of { t, log_odds } waypoints.
// Plus birth_t for the "when does this sphere exist?" check.
for (const b of data.beliefs) {
  const evs = eventsByBelief.get(b.id) || [];
  const current_lo = logit(b.mass);
  let sum_delta = 0;
  for (const e of evs) if (e.type === 'jump') sum_delta += e.d;
  const initial = current_lo - sum_delta;
  const traj = [];
  let cur = initial;
  let birth_t = 0;
  for (const e of evs) {
    if (e.type === 'birth') {
      birth_t = e.t;
      traj.push({ t: e.t, lo: initial });
    } else if (e.type === 'jump') {
      cur += e.d;
      traj.push({ t: e.t, lo: cur });
    }
  }
  // Edge case: no birth event (shouldn't happen but be defensive)
  if (traj.length === 0) {
    traj.push({ t: 0, lo: current_lo });
  }
  b._traj = traj;
  b._birth_t = birth_t;
}

function massAtTime(b, t) {
  if (t < b._birth_t) return null;
  const traj = b._traj;
  // Binary search: largest index with t_w <= t
  let lo = 0, hi = traj.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (traj[mid].t <= t) lo = mid; else hi = mid - 1;
  }
  return sigmoid(traj[lo].lo);
}

// ----- replay mode + controls -----
let mode = 'live';          // 'live' | 'replay'
let playing = false;
let cursor = duration;      // virtual time position
let lastFrameMs = performance.now();

const playbtn = document.getElementById('playbtn');
const scrub = document.getElementById('scrub');
const timelabel = document.getElementById('timelabel');

function fmtTime(t) {
  if (t >= duration - 0.01) return 'end';
  const m = Math.floor(t / 60);
  const s = Math.floor(t - m * 60);
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')} / ${Math.floor(duration / 60).toString().padStart(2, '0')}:${Math.floor(duration % 60).toString().padStart(2, '0')}`;
}

function enterReplay() {
  if (mode === 'replay') return;
  mode = 'replay';
  playbtn.classList.remove('live');
}

function enterLive() {
  mode = 'live';
  playing = false;
  playbtn.textContent = '▶ replay';
  playbtn.classList.add('live');
  timelabel.textContent = 'live · now';
  // Restore static snapshot state.
  for (const b of data.beliefs) {
    const mesh = beliefById.get(b.id);
    if (!mesh) continue;
    mesh.visible = true;
    mesh.position.y = b.z * HEIGHT_SCALE;
    mesh.material.opacity = 0.45 + 0.55 * b.mass;
  }
  for (const { line, meshA, meshB } of edgeLines) {
    line.visible = true;
    const pa = line.geometry.attributes.position.array;
    pa[0] = meshA.position.x; pa[1] = meshA.position.y; pa[2] = meshA.position.z;
    pa[3] = meshB.position.x; pa[4] = meshB.position.y; pa[5] = meshB.position.z;
    line.geometry.attributes.position.needsUpdate = true;
  }
}

function updateFrame(t) {
  // Beliefs: visibility by birth time, Y by interpolated mass
  for (const b of data.beliefs) {
    const mesh = beliefById.get(b.id);
    if (!mesh) continue;
    const m = massAtTime(b, t);
    if (m === null) {
      mesh.visible = false;
    } else {
      mesh.visible = true;
      mesh.position.y = m * HEIGHT_SCALE;
      mesh.material.opacity = 0.45 + 0.55 * m;
    }
  }
  // Edges: visibility by birth time, geometry refresh for any with
  // both endpoints visible (their Y values just changed).
  for (const { edge, line, meshA, meshB } of edgeLines) {
    if (t < edge.birth_t || !meshA.visible || !meshB.visible) {
      line.visible = false;
      continue;
    }
    line.visible = true;
    const pa = line.geometry.attributes.position.array;
    pa[0] = meshA.position.x; pa[1] = meshA.position.y; pa[2] = meshA.position.z;
    pa[3] = meshB.position.x; pa[4] = meshB.position.y; pa[5] = meshB.position.z;
    line.geometry.attributes.position.needsUpdate = true;
  }
  timelabel.textContent = fmtTime(t);
}

playbtn.addEventListener('click', () => {
  if (duration <= 0) return;
  if (mode === 'live') {
    enterReplay();
    cursor = 0;
    updateFrame(cursor);
    scrub.value = 0;
  }
  if (!playing) {
    if (cursor >= duration - 0.01) { cursor = 0; scrub.value = 0; }
    playing = true;
    playbtn.textContent = '❚❚ pause';
  } else {
    playing = false;
    playbtn.textContent = '▶ resume';
  }
});

scrub.addEventListener('input', () => {
  if (duration <= 0) return;
  enterReplay();
  playing = false;
  playbtn.textContent = '▶ resume';
  cursor = (parseFloat(scrub.value) / 1000) * duration;
  updateFrame(cursor);
});

// Double-click scrubber → return to live.
scrub.addEventListener('dblclick', () => {
  enterLive();
  scrub.value = 1000;
});

// ----- hover inspection -----
const raycaster = new THREE.Raycaster();
raycaster.params.Line.threshold = 0.5;
const ndc = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

addEventListener('pointermove', (ev) => {
  ndc.x = (ev.clientX / innerWidth) * 2 - 1;
  ndc.y = -(ev.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length > 0) {
    const b = hits[0].object.userData;
    tooltip.innerHTML =
      `<span class="field-tag">[${escapeHtml(b.field)}]</span> ` +
      `<span class="mass">m=${b.mass.toFixed(2)}</span> ` +
      `<span class="voices">v=${b.voices}</span><br>` +
      escapeHtml(b.desc);
    tooltip.style.left = (ev.clientX + 14) + 'px';
    tooltip.style.top = (ev.clientY + 14) + 'px';
    tooltip.style.display = 'block';
  } else {
    tooltip.style.display = 'none';
  }
});

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ----- resize -----
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ----- loop -----
// Target replay duration: ~60 real seconds for the full history.
// Tweakable via keyboard later if needed.
const TARGET_REPLAY_SECONDS = 60;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastFrameMs) / 1000, 0.1);
  lastFrameMs = now;

  if (mode === 'replay' && playing && duration > 0) {
    const speed = duration / TARGET_REPLAY_SECONDS;
    cursor += dt * speed;
    if (cursor >= duration) {
      cursor = duration;
      playing = false;
      playbtn.textContent = '▶ replay again';
    }
    scrub.value = Math.round((cursor / duration) * 1000);
    updateFrame(cursor);
  }

  controls.update();
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
